<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="utf-8">
<title>3D Cultural Heritage Viewer</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: sans-serif;
}

#viewer-area {
  width: 70%;
  height: 100%;
  background: #222;
}

model-viewer {
  width: 100%;
  height: 100%;
}

#info-area {
  width: 30%;
  padding: 20px;
  overflow-y: auto;
  background: #f5f5f5;
  box-sizing: border-box;
}

label {
  display: block;
  margin-top: 10px;
  margin-bottom: 4px;
  font-weight: bold;
}

select {
  width: 100%;
  padding: 8px;
  margin-bottom: 12px;
  font-size: 16px;
}

h2 {
  margin-top: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
  margin-bottom: 16px;
  font-size: 14px;
}

th {
  width: 35%;
  text-align: left;
  vertical-align: top;
  padding: 6px;
  background: #e0e0e0;
}

td {
  padding: 6px;
  background: #ffffff;
}

p {
  line-height: 1.6;
}
</style>
</head>

<body>

<div id="viewer-area">
  <model-viewer
    id="viewer"
    src=""
    camera-controls
    auto-rotate
    shadow-intensity="1"
    camera-orbit="45deg 75deg 6m"
    field-of-view="30deg"
    ar>
  </model-viewer>
</div>

<div id="info-area">

  <label for="languageSelect">Language</label>
  <select id="languageSelect">
    <option value="ja">日本語</option>
    <option value="en">English</option>
  </select>

  <label for="modelSelect">Model</label>
  <select id="modelSelect"></select>

  <div id="description">
    <p>CSVデータを読み込み中です。</p>
  </div>

</div>

<script>
const viewer = document.getElementById("viewer");
const modelSelect = document.getElementById("modelSelect");
const languageSelect = document.getElementById("languageSelect");
const description = document.getElementById("description");

let models = [];
let currentLanguage = "ja";

fetch("DDB.csv")
  .then(response => {
    if (!response.ok) {
      throw new Error("CSV file not found");
    }
    return response.text();
  })
  .then(csvText => {
    models = parseCSV(csvText);
    setupModelSelector(models);

    if (models.length > 0) {
      showModel(models[0]);
    } else {
      description.innerHTML = "<p>CSVにモデルデータがありません。</p>";
    }
  })
  .catch(error => {
    console.error("CSV loading error:", error);
    description.innerHTML = "<p>CSVデータを読み込めませんでした。</p>";
  });

function setupModelSelector(models) {
  modelSelect.innerHTML = "";

  models.forEach(model => {
    const option = document.createElement("option");
    option.value = model.id;
    option.textContent = model.label || model.id;
    modelSelect.appendChild(option);
  });
}

function showModel(model) {
  viewer.src = model.file;

  const lang = currentLanguage;
  const suffix = "_" + lang;

  description.innerHTML = `
    <h2>${escapeHTML(model["title" + suffix])}</h2>

    <table>
      <tr>
        <th>${label("Object type", "種別")}</th>
        <td>${escapeHTML(model["object_type" + suffix])}</td>
      </tr>
      <tr>
        <th>${label("Period", "時代")}</th>
        <td>${escapeHTML(model["period" + suffix])}</td>
      </tr>
      <tr>
        <th>${label("Site", "遺跡")}</th>
        <td>${escapeHTML(model["site" + suffix])}</td>
      </tr>
      <tr>
        <th>${label("Location", "所在地")}</th>
        <td>
          ${escapeHTML(model["city" + suffix])},
          ${escapeHTML(model["prefecture" + suffix])},
          ${escapeHTML(model["country" + suffix])}
        </td>
      </tr>
      <tr>
        <th>${label("Report", "報告書")}</th>
        <td>${escapeHTML(model["report" + suffix])}</td>
      </tr>
      <tr>
        <th>${label("Figure", "掲載図")}</th>
        <td>${escapeHTML(model.figure)}</td>
      </tr>
      <tr>
        <th>${label("Institution", "所蔵・展示")}</th>
        <td>${escapeHTML(model["institution" + suffix])}</td>
      </tr>
    </table>

    <p>${escapeHTML(model["description" + suffix])}</p>

    <p>
      <a href="${escapeAttribute(model.source_url)}"
         target="_blank"
         rel="noopener noreferrer">
        ${label("Original Data", "元データ")}
      </a>
    </p>
  `;
}

modelSelect.addEventListener("change", function() {
  const selected = models.find(model => model.id === this.value);

  if (!selected) {
    console.error("Model not found:", this.value);
    return;
  }

  showModel(selected);
});

languageSelect.addEventListener("change", function() {
  currentLanguage = this.value;

  const selected = models.find(model => model.id === modelSelect.value);

  if (!selected) {
    console.error("Model not found:", modelSelect.value);
    return;
  }

  showModel(selected);
});

function label(en, ja) {
  return currentLanguage === "ja" ? ja : en;
}

function parseCSV(text) {
  const rows = text.trim().split(/\r?\n/);
  const headers = splitCSVLine(rows[0]).map(h => h.trim());

  return rows.slice(1)
    .filter(row => row.trim() !== "")
    .map(row => {
      const values = splitCSVLine(row);
      const obj = {};

      headers.forEach((header, index) => {
        obj[header] = values[index] ? values[index].trim() : "";
      });

      return obj;
    });
}

function splitCSVLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    const nextChar = line[i + 1];

    if (char === '"' && inQuotes && nextChar === '"') {
      current += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function escapeHTML(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttribute(str) {
  return escapeHTML(str);
}
</script>

</body>
</html>
