<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body {
  margin: 0;
}

model-viewer {
  width: 100vw;
  height: 90vh;
}
</style>
</head>

<body>

<select id="modelSelect">

<option value="models/ea510ce736104fbbb5f63a47f235a4a3.glb">
ShioyaKinseiJinja-Sekibo
</option>

<option value="models/64b4fa034a8d4a3fb39a68a894889502.glb">
Dounomae-Sekibo
</option>

</select>

<model-viewer
id="viewer"
src="models/ea510ce736104fbbb5f63a47f235a4a3.glb"
camera-controls
auto-rotate>
</model-viewer>

<script>

const viewer =
document.getElementById('viewer');

document.getElementById('modelSelect')
.addEventListener('change', function() {

viewer.src = this.value;

});

</script>

</body>
</html>
